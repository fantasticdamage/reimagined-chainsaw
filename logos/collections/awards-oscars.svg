<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.90  0 1 0 0 0.03  0 0 1 0 0.08  0 0 0 0.55 0" result="redGlow"/>
      <feMerge>
        <feMergeNode in="redGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#f2f2f2"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <rect width="900" height="300" fill="transparent"/>
  <text x="450" y="145" text-anchor="middle" dominant-baseline="middle"
        fill="url(#shine)" font-family="Arial Black, Impact, Helvetica, Arial, sans-serif"
        font-size="60" font-weight="900" letter-spacing="5" filter="url(#softGlow)">AWARD WINNERS</text>
  <rect x="300" y="207" width="300" height="8" rx="4" fill="#D4AF37" opacity="0.92"/>
</svg>